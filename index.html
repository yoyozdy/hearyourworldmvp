<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hear Your World - v14</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #000; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 4000; display: flex; align-items: center; justify-content: center; }
        .auth-card { text-align: center; width: 85%; max-width: 320px; }
        .av-opt { font-size: 50px; cursor: pointer; opacity: 0.2; margin: 10px; display: inline-block; transition: 0.3s; filter: grayscale(1); }
        .av-opt.selected { opacity: 1; transform: scale(1.2); filter: grayscale(0); }
        .pin-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #000; padding: 20px 35px; border-radius: 100px; color: #fff; font-weight: 800; z-index: 2000; border: none; display: none; }
        .custom-marker { text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .marker-body { width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #fff; }
        .marker-name { color: #fff; font-size: 11px; font-weight: bold; margin-top: 6px; background: rgba(0,0,0,0.7); padding: 3px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h1 style="letter-spacing:-2px; margin-bottom:5px;">HEAR YOUR WORLD</h1>
        <p style="color:#999; margin-bottom:30px;">Tap to unlock the soundscape</p>
        <input id="user-name" type="text" placeholder="Your Name" style="width:100%; padding:18px; border-radius:20px; border:2px solid #eee; margin-bottom:15px; font-size:16px; outline:none;">
        <div class="avatar-box">
            <span id="av-m" class="av-opt" onclick="setAv('male')">👨🏻‍💻</span>
            <span id="av-f" class="av-opt" onclick="setAv('female')">👩🏻‍🎨</span>
        </div>
        <button onclick="enterWorld()" style="width:100%; padding:20px; background:#007AFF; color:white; border:none; border-radius:25px; font-weight:bold; font-size:18px; cursor:pointer;">START EXPLORING</button>
    </div>
</div>

<div id="map"></div>
<button id="drop-button" class="pin-btn">📍 DROP A SOUND</button>

<script>
    const DB_URL = 'https://cpayvfeaelxsdimbfqkk.supabase.co'; 
    const DB_KEY = 'sb_publishable_ktemn0nndd99JZoeO6tV9g_ShZoBn8S'; 
    const _db = supabase.createClient(DB_URL, DB_KEY);
    const ADMINS = ['Dayou', 'Rainie'];
    
    let globalPlayer = new Audio();
    globalPlayer.setAttribute('playsinline', 'true');
    globalPlayer.setAttribute('webkit-playsinline', 'true');

    mapboxgl.accessToken = 'pk.eyJ1IjoieW95b3pkeSIsImEiOiJjbW9vZnJvcmgxaDg0MndvZzRuOG0zYnRhIn0.cjcEvC5FbhpFRQ8jAJi-fA';
    const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/light-v11', center: [121.47, 31.23], zoom: 13 });

    // 检查 Session
    window.onload = () => {
        const savedName = sessionStorage.getItem('hyw_name');
        if(savedName) {
            hideAuth();
            loadStamps();
        }
    };

    function setAv(t) {
        sessionStorage.setItem('hyw_av', t);
        document.getElementById('av-m').className = 'av-opt' + (t==='male' ? ' selected' : '');
        document.getElementById('av-f').className = 'av-opt' + (t==='female' ? ' selected' : '');
    }

    function hideAuth() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('drop-button').style.display = 'block';
    }

    async function enterWorld() {
        const n = document.getElementById('user-name').value.trim();
        const av = sessionStorage.getItem('hyw_av');
        
        if(!n) return alert("Please enter your name!");
        if(!av) return alert("Please select an avatar!");
        
        // 尝试解锁音频，但不阻塞进入流程
        globalPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
        globalPlayer.play().catch(() => console.log("Audio waiting for first interaction"));
        
        sessionStorage.setItem('hyw_name', n);
        hideAuth();
        loadStamps();
    }

    async function loadStamps() {
        const { data } = await _db.from('sound_stamps').select('*');
        const myName = sessionStorage.getItem('hyw_name');
        if(!data) return;

        data.forEach(s => {
            const el = document.createElement('div');
            el.className = 'custom-marker';
            el.innerHTML = `<div class="marker-body">${s.avatar_type==='male'?'👨🏻‍💻':'👩🏻‍🎨'}</div>
                            <div class="marker-name">${s.username} ${s.emoji}</div>`;
            
            let pressTimer;
            
            el.addEventListener('touchstart', () => {
                pressTimer = setTimeout(() => {
                    if(ADMINS.includes(myName)) {
                        if(confirm(`Admin: Delete ${s.username}'s sound?`)) {
                            _db.from('sound_stamps').delete().eq('id', s.id).then(() => location.reload());
                        }
                    }
                }, 1000);
            }, { passive: true });

            el.addEventListener('touchend', (e) => {
                clearTimeout(pressTimer);
                // 同步切换源并播放
                globalPlayer.src = s.audio_url;
                globalPlayer.load();
                globalPlayer.play().catch(err => alert("Tap again to play!"));
            });

            new mapboxgl.Marker(el).setLngLat([s.longitude, s.latitude]).addTo(map);
        });
    }

    // 录制部分
    const btn = document.getElementById('drop-button');
    let recorder, chunks = [];
    btn.onclick = async () => {
        if(!recorder || recorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const options = { mimeType: 'audio/webm;codecs=opus' }; // 现代手机更通用的webm封装
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = saveStamp;
                recorder.start();
                btn.innerText = "⏹ STOP";
                btn.style.background = "red";
            } catch(e) { alert("Please enable Microphone access!"); }
        } else {
            recorder.stop();
            btn.innerText = "📍 DROP A SOUND";
            btn.style.background = "#000";
        }
    };

    async function saveStamp() {
        const mood = prompt("Emoji tag?", "✨");
        // 既然你是 iPhone 测试，我们依然保存为 .mp3 后缀名来提高系统的识别度
        const blob = new Blob(chunks, { type: 'audio/mp3' });
        const fName = `audio_${Date.now()}.mp3`;
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await _db.storage.from('audio-files').upload(fName, blob);
            const { data } = _db.storage.from('audio-files').getPublicUrl(fName);
            await _db.from('sound_stamps').insert([{
                username: sessionStorage.getItem('hyw_name'),
                avatar_type: sessionStorage.getItem('hyw_av'),
                emoji: mood || '📍', audio_url: data.publicUrl,
                latitude: pos.coords.latitude, longitude: pos.coords.longitude
            }]);
            location.reload();
        }, () => alert("GPS needed!"));
    }
</script>
</body>
</html>
