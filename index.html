<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hear Your World - MVP v5</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #fff; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); z-index: 3000; display: flex; 
            align-items: center; justify-content: center;
        }
        .auth-card { background: #fff; padding: 35px 25px; border-radius: 30px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .avatar-box { display: flex; justify-content: center; gap: 30px; margin: 25px 0; }
        .av-opt { font-size: 55px; cursor: pointer; opacity: 0.2; transition: 0.3s; filter: grayscale(1); }
        .av-opt.selected { opacity: 1; transform: scale(1.1); filter: grayscale(0); }

        .pin-btn { 
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: #000; padding: 18px 30px; border-radius: 100px;
            color: #fff; font-weight: 800; font-size: 14px; z-index: 2000; 
            min-width: 220px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none;
        }
        .pin-btn.recording { background: #FF3B30; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .custom-marker { text-align: center; cursor: pointer; z-index: 10; }
        .marker-body { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 2px solid #fff; }
        .marker-name { color: #333; font-size: 10px; font-weight: 700; margin-top: 4px; background: rgba(255,255,255,0.9); padding: 2px 8px; border-radius: 10px; }
        .marker-emoji { position: absolute; top: -5px; right: -5px; font-size: 20px; background: white; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="margin:0; letter-spacing: -1px;">HEAR YOUR WORLD</h2>
        <p style="color:#999; font-size:13px; margin: 10px 0 25px;">Enter a name for this session</p>
        <input id="user-name" type="text" placeholder="Who are you?" style="width:100%; padding:15px; border-radius:15px; border:2px solid #eee; font-size:16px; box-sizing:border-box; outline: none;">
        <div class="avatar-box">
            <span id="av-m" class="av-opt" onclick="setAv('male')">👨🏻‍💻</span>
            <span id="av-f" class="av-opt" onclick="setAv('female')">👩🏻‍🎨</span>
        </div>
        <button onclick="enterWorld()" style="width:100%; padding:18px; background:#000; color:white; border:none; border-radius:18px; font-weight:700; font-size:16px; cursor:pointer;">START EXPLORING</button>
    </div>
</div>

<div id="map"></div>
<div id="drop-button" class="pin-btn">📍 DROP A SOUND</div>

<script>
    const DB_URL = 'https://cpayvfeaelxsdimbfqkk.supabase.co'; 
    const DB_KEY = 'sb_publishable_ktemn0nndd99JZoeO6tV9g_ShZoBn8S'; 
    const _db = supabase.createClient(DB_URL, DB_KEY);

    const ADMINS = ['Dayou', 'Rainie'];
    let recorder, chunks = [], isRec = false;
    let audioInstance = null; // Single instance to prevent overlapping

    mapboxgl.accessToken = 'pk.eyJ1IjoieW95b3pkeSIsImEiOiJjbW9vZnJvcmgxaDg0MndvZzRuOG0zYnRhIn0.cjcEvC5FbhpFRQ8jAJi-fA';
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11', 
        center: [121.47, 31.23],
        zoom: 12
    });

    // On Load: Use sessionStorage so it resets when browser closes
    window.onload = () => {
        const n = sessionStorage.getItem('hyw_name');
        const a = sessionStorage.getItem('hyw_av');
        if(n && a) {
            hideAuth();
            loadStamps();
        }
    };

    function setAv(t) {
        sessionStorage.setItem('hyw_av', t);
        document.getElementById('av-m').className = 'av-opt' + (t==='male'?' selected':'');
        document.getElementById('av-f').className = 'av-opt' + (t==='female'?' selected':'');
    }

    function enterWorld() {
        const n = document.getElementById('user-name').value.trim();
        const av = sessionStorage.getItem('hyw_av');
        if(!n || !av) return alert("Pick a name and avatar!");
        sessionStorage.setItem('hyw_name', n);
        hideAuth();
        loadStamps();
    }

    function hideAuth() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('drop-button').style.display = 'block';
    }

    const btn = document.getElementById('drop-button');
    btn.onclick = async () => {
        if(!isRec) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = saveStamp;
                recorder.start();
                isRec = true;
                btn.classList.add('recording');
                btn.innerText = "⏹ STOP (RECORDING...)";
            } catch (err) { alert("Please allow microphone access"); }
        } else {
            isRec = false;
            recorder.stop();
            btn.innerText = "📍 DROP A SOUND";
            btn.classList.remove('recording');
        }
    };

    async function saveStamp() {
        const mood = prompt("Mood emoji?", "✨");
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const fName = `audio_${Date.now()}.webm`;
        const n = sessionStorage.getItem('hyw_name');
        const a = sessionStorage.getItem('hyw_av');

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            const { error: uploadError } = await _db.storage.from('audio-files').upload(fName, blob);
            if (uploadError) return alert("Upload failed");

            const { data } = _db.storage.from('audio-files').getPublicUrl(fName);
            await _db.from('sound_stamps').insert([{
                username: n, avatar_type: a, emoji: mood || '📍',
                audio_url: data.publicUrl, latitude, longitude
            }]);
            location.reload();
        }, () => alert("Need GPS to pin your sound!"));
    }

    async function loadStamps() {
        const { data } = await _db.from('sound_stamps').select('*');
        const myName = sessionStorage.getItem('hyw_name');
        if(!data) return;
        
        data.forEach(s => {
            const el = document.createElement('div');
            el.className = 'custom-marker';
            el.innerHTML = `<div class="marker-body">${s.avatar_type==='male'?'👨🏻':'👩🏻'}</div>
                            <div class="marker-emoji">${s.emoji}</div>
                            <div class="marker-name">${s.username}</div>`;
            
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                
                // Fix for Mobile Audio: Stop existing, start new
                if(audioInstance) { audioInstance.pause(); audioInstance = null; }
                
                audioInstance = new Audio(s.audio_url);
                audioInstance.play().catch(err => {
                    console.log("Audio play blocked", err);
                    alert("Tap again to play!");
                });

                // Admin Delete Logic
                if(ADMINS.includes(myName)) {
                    setTimeout(() => {
                        if(confirm(`Admin: Delete ${s.username}'s sound?`)) {
                            _db.from('sound_stamps').delete().eq('id', s.id).then(() => location.reload());
                        }
                    }, 800);
                }
            });
            new mapboxgl.Marker(el).setLngLat([s.longitude, s.latitude]).addTo(map);
        });
    }
</script>
</body>
</html>
