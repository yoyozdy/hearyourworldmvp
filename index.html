<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hear Your World - MVP</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #fff; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: #fff; padding: 40px 20px; border-radius: 30px; text-align: center; width: 85%; max-width: 320px;
        }
        .avatar-box { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .av-opt { font-size: 50px; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .av-opt.selected { opacity: 1; transform: scale(1.1); }

        /* 修正按钮：确保文字不换行 */
        .pin-btn { 
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 16px 24px; border-radius: 100px; border: 1px solid rgba(0,0,0,0.1);
            color: #000; font-weight: 700; font-size: 13px; letter-spacing: 1px;
            z-index: 10; cursor: pointer; white-space: nowrap; min-width: 200px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .pin-btn.recording { background: rgba(255, 59, 48, 0.9); color: white; border: none; }

        .custom-marker { text-align: center; }
        .marker-body { 
            width: 50px; height: 50px; background: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 2px solid #fff;
        }
        .marker-name { color: white; font-size: 10px; font-weight: 600; margin-top: 4px; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 10px; }
        .marker-emoji { position: absolute; top: -5px; right: -5px; font-size: 18px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="margin:0; color:#000;">Hear Your World</h2>
        <p style="color:#666; font-size:14px;">Share your sound stamp</p>
        <input id="user-name" type="text" placeholder="Your Name" style="width:85%; padding:15px; border-radius:15px; border:1px solid #eee; margin-top:10px; font-size:16px;">
        <div class="avatar-box">
            <span id="av-m" class="av-opt" onclick="setAv('male')">👨</span>
            <span id="av-f" class="av-opt" onclick="setAv('female')">👩</span>
        </div>
        <button onclick="enterWorld()" style="width:90%; padding:15px; background:#007AFF; color:white; border:none; border-radius:15px; font-weight:700;">ENTER</button>
    </div>
</div>

<div id="map"></div>
<div id="drop-button" class="pin-btn" style="display:none;">📍 DROP A SOUND</div>

<script>
    // --- 请确保填入你的 URL 和 KEY ---
    const DB_URL = 'https://cpayvfeaelxsdimbfqkk.supabase.co'; 
    const DB_KEY = 'sb_publishable_ktemn0nndd99JZoeO6tV9g_ShZoBn8S'; 
    const _db = supabase.createClient(DB_URL, DB_KEY);

    const ADMINS = ['Dayou', 'Rainie', 'admin3', 'admin4', 'admin5'];
    let me = { name: '', avatar: '' };
    let recorder;
    let chunks = [];
    let isRec = false;

    mapboxgl.accessToken = 'pk.eyJ1IjoieW95b3pkeSIsImEiOiJjbW9vZnJvcmgxaDg0MndvZzRuOG0zYnRhIn0.cjcEvC5FbhpFRQ8jAJi-fA';
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12', // 恢复彩色地图
        center: [121.47, 31.23],
        zoom: 13
    });

    function setAv(t) {
        me.avatar = t;
        document.getElementById('av-m').className = 'av-opt' + (t==='male'?' selected':'');
        document.getElementById('av-f').className = 'av-opt' + (t==='female'?' selected':'');
    }

    function enterWorld() {
        const n = document.getElementById('user-name').value.trim();
        if(!n || !me.avatar) return alert("Name & Avatar required!");
        me.name = n;
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('drop-button').style.display = 'block';
        loadStamps();
    }

    const btn = document.getElementById('drop-button');
    btn.onclick = async () => {
        if(!isRec) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = saveStamp;
            recorder.start();
            isRec = true;
            btn.classList.add('recording');
            let sec = 15;
            btn.innerText = `⏹ STOP (${sec}s)`;
            const cd = setInterval(() => {
                sec--;
                if(sec <= 0 || !isRec) { clearInterval(cd); if(isRec) stopRec(); }
                else { btn.innerText = `⏹ STOP (${sec}s)`; }
            }, 1000);
        } else { stopRec(); }
    };

    function stopRec() {
        isRec = false;
        recorder.stop();
        btn.innerText = "📍 DROP A SOUND";
        btn.classList.remove('recording');
    }

    async function saveStamp() {
        const mood = prompt("What's your mood emoji?", "✨");
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const fName = `audio_${Date.now()}.webm`;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            // 上传
            const { error: upErr } = await _db.storage.from('audio-files').upload(fName, blob);
            if(upErr) return alert("Upload failed: " + upErr.message);

            const { data } = _db.storage.from('audio-files').getPublicUrl(fName);
            // 存入数据库
            const { error: dbErr } = await _db.from('sound_stamps').insert([{
                username: me.name,
                avatar_type: me.avatar,
                emoji: mood || '📍',
                audio_url: data.publicUrl,
                latitude, longitude
            }]);
            
            if(dbErr) alert("Database error: " + dbErr.message);
            else location.reload();
        }, (err) => alert("Please enable GPS/Location"));
    }

    async function loadStamps() {
        const { data } = await _db.from('sound_stamps').select('*');
        if(!data) return;
        data.forEach(s => {
            const el = document.createElement('div');
            el.className = 'custom-marker';
            el.innerHTML = `
                <div class="marker-body">${s.avatar_type==='male'?'👨':'👩'}</div>
                <div class="marker-name">${s.username}</div>
                <div class="marker-emoji">${s.emoji}</div>
            `;
            el.onclick = () => {
                new Audio(s.audio_url).play();
                if(ADMINS.includes(me.name) && confirm("Admin: Delete?")) {
                    _db.from('sound_stamps').delete().eq('id', s.id).then(() => location.reload());
                }
            };
            new mapboxgl.Marker(el).setLngLat([s.longitude, s.latitude]).addTo(map);
        });
    }
</script>
</body>
</html>
