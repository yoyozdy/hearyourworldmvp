<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hear Your World - MVP</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
     /* 替换掉原来的 .pin-btn */
.pin-btn { 
    position: fixed; 
    bottom: 35px;           /* 距离底部稍微近一点 */
    left: 50%; 
    transform: translateX(-50%);
    
    /* 1. 极致半透明感 */
    background: rgba(255, 255, 255, 0.3); 
    backdrop-filter: blur(10px);          
    -webkit-backdrop-filter: blur(10px);  
    
    /* 2. 尺寸瘦身 */
    padding: 10px 24px;      /* 减小了内边距，让它更细长 */
    min-width: 120px;       /* 设置最小宽度，保证平衡感 */
    text-align: center;
    white-space: nowrap;
    
    /* 3. 边框与文字 */
    color: #1A1A1A; 
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 100px;    /* 完美的圆角胶囊状 */
    
    /* 4. 字体微调 */
    font-weight: 500; 
    font-size: 13px;         /* 稍微缩小字号 */
    letter-spacing: 1.5px;   /* 保持高级的间距感 */
    text-transform: uppercase;
    
    box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* 更轻的阴影 */
    z-index: 10;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* 交互反馈 */
.pin-btn:active {
    transform: translateX(-50%) scale(0.95);
    background: rgba(255, 255, 255, 0.6);
}
    </style>
</head>
<body>
    <div id="map"></div>
    <!-- 这里的 id="drop-button" 是关键，脚本靠它来控制录音 -->
    <div id="drop-button" class="pin-btn">📍Drop a Sound</div>

    <script>
        // 1. 初始化地图
        mapboxgl.accessToken = 'pk.eyJ1IjoieW95b3pkeSIsImEiOiJjbW9vZnJvcmgxaDg0MndvZzRuOG0zYnRhIn0.cjcEvC5FbhpFRQ8jAJi-fA';
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/streets-v12',
            center: [121.47, 31.23],
            zoom: 12
        });

        // 2. 核心：集成录音与定位的一键触发功能
        async function startSoundStamp() {
            const btn = document.getElementById('drop-button');
            
            try {
                // 请求麦克风权限（手机端必须在 HTTPS 下触发）
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();

                // 同时获取定位并打点
                navigator.geolocation.getCurrentPosition((position) => {
                    const { longitude, latitude } = position.coords;
                    map.flyTo({ center: [longitude, latitude], zoom: 15 });
                    // 在地图上放置一个标记
                    new mapboxgl.Marker().setLngLat([longitude, latitude]).addTo(map);
                }, (err) => {
                    console.error("定位失败", err);
                    alert("请开启手机 GPS 定位权限");
                });

                // 3. UI 倒计时反馈（15秒声音邮票）
                let timeLeft = 15;
                btn.innerText = `Recording... ${timeLeft}s 📍`;
                btn.style.background = "rgba(255, 100, 100, 0.5)"; // 录音时呈现淡红色提醒

                const timer = setInterval(() => {
                    timeLeft--;
                    if (timeLeft > 0) {
                        btn.innerText = `Recording... ${timeLeft}s 📍`;
                    } else {
                        clearInterval(timer);
                        btn.innerText = "Sound Dropped! 📍";
                        btn.style.background = "rgba(255, 255, 255, 0.3)";
                    }
                }, 1000);

                // 15秒后自动停止录音
                setTimeout(() => {
                    if (mediaRecorder.state === "recording") {
                        mediaRecorder.stop();
                        alert("🎉 15秒声音邮票已成功掉落！");
                    }
                }, 15000);

            } catch (err) {
                console.error("权限开启失败", err);
                alert("请在手机设置中允许 Safari/Chrome 使用麦克风和位置。");
            }
        }

        // 绑定点击事件：替换掉 HTML 里的 onclick，更符合 2026 规范
        document.getElementById('drop-button').addEventListener('click', startSoundStamp);
    </script>
</body>
</html>
