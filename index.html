<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hear Your World - Final Fix</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #000; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 4000; display: flex; align-items: center; justify-content: center; }
        .auth-card { text-align: center; width: 85%; max-width: 320px; }
        .av-opt { font-size: 50px; cursor: pointer; opacity: 0.2; margin: 10px; display: inline-block; transition: 0.3s; filter: grayscale(1); }
        .av-opt.selected { opacity: 1; transform: scale(1.2); filter: grayscale(0); }
        .pin-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #007AFF; padding: 20px 35px; border-radius: 100px; color: #fff; font-weight: 800; z-index: 2000; border: none; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .custom-marker { text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .marker-body { width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #fff; }
        .marker-name { color: #fff; font-size: 11px; font-weight: bold; margin-top: 6px; background: rgba(0,0,0,0.7); padding: 3px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h1 style="letter-spacing:-2px; margin-bottom:5px;">HEAR YOUR WORLD</h1>
        <p style="color:#999; margin-bottom:30px;">Audio Social Antidote</p>
        <input id="user-name" type="text" placeholder="Your Name" style="width:100%; padding:18px; border-radius:20px; border:2px solid #eee; margin-bottom:15px; font-size:16px; outline:none;">
        <div class="avatar-box">
            <span id="av-m" class="av-opt" onclick="setAv('male')">👨🏻‍💻</span>
            <span id="av-f" class="av-opt" onclick="setAv('female')">👩🏻‍🎨</span>
        </div>
        <button onclick="enterWorld()" style="width:100%; padding:20px; background:#007AFF; color:white; border:none; border-radius:25px; font-weight:bold; font-size:18px;">START EXPLORING</button>
    </div>
</div>

<div id="map"></div>
<button id="drop-button" class="pin-btn">📍 DROP A SOUND </button>

<script>
    // 【修改点】尝试从环境变量读取，如果读取不到则使用你刚才提供的默认值
    // 建议在 Vercel 中设置 NEXT_PUBLIC_SUPABASE_URL
    const DB_URL = window.location.hostname === 'localhost' ? 'https://cpayvfeaelxsdimbfqkk.supabase.co' : (process?.env?.NEXT_PUBLIC_SUPABASE_URL || 'https://cpayvfeaelxsdimbfqkk.supabase.co');
    const DB_KEY = window.location.hostname === 'localhost' ? 'sb_publishable_ktemn0nndd99JZoeO6tV9g_ShZoBn8S' : (process?.env?.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'sb_publishable_ktemn0nndd99JZoeO6tV9g_ShZoBn8S');
    
    const _db = supabase.createClient(DB_URL, DB_KEY);
    
    mapboxgl.accessToken = 'pk.eyJ1IjoieW95b3pkeSIsImEiOiJjbW9yYWhyaDEyMGRuMnBzMWhqd2ExNzQ5In0.OOYCgsK0LHMDrTpVaeAEaQ';
    const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/light-v11', center: [121.47, 31.23], zoom: 13 });

    window.onload = () => { if(sessionStorage.getItem('hyw_name')) { hideAuth(); loadStamps(); } };

    function setAv(t) {
        sessionStorage.setItem('hyw_av', t);
        document.getElementById('av-m').className = 'av-opt' + (t==='male' ? ' selected' : '');
        document.getElementById('av-f').className = 'av-opt' + (t==='female' ? ' selected' : '');
    }

    function hideAuth() { document.getElementById('auth-overlay').style.display = 'none'; document.getElementById('drop-button').style.display = 'block'; }

    async function enterWorld() {
        const n = document.getElementById('user-name').value.trim();
        const av = sessionStorage.getItem('hyw_av');
        if(!n || !av) return alert("Pick name & avatar!");
        globalPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
        globalPlayer.play().catch(() => {});
        sessionStorage.setItem('hyw_name', n);
        hideAuth();
        loadStamps();
    }

    async function loadStamps() {
        // 【核心修复】增加错误捕获，防止因为表不存在导致地图空白
        try {
            const { data, error } = await _db.from('sound_stamps').select('*');
            if (error) throw error;
            if(!data) return;

            data.forEach(s => {
                const el = document.createElement('div');
                el.className = 'custom-marker';
                el.innerHTML = `<div class="marker-body">${s.avatar_type==='male'?'👨🏻‍💻':'👩🏻‍🎨'}</div>
                                <div class="marker-name">${s.username || 'User'} ${s.emoji || ''}</div>`;
                
                el.addEventListener('click', () => {
                    globalPlayer.src = s.audio_url;
                    globalPlayer.play().catch(() => alert("Tap again to play!"));
                });

                // 兼容旧字段名和新字段名
                const lng = s.longitude || s.lng;
                const lat = s.latitude || s.lat;
                if(lng && lat) new mapboxgl.Marker(el).setLngLat([lng, lat]).addTo(map);
            });
        } catch (e) {
            console.error("Load Error:", e);
        }
    }

    const btn = document.getElementById('drop-button');
    let recorder, chunks = [], globalPlayer = new Audio();

    btn.onclick = async () => {
        if(!recorder || recorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
                recorder = new MediaRecorder(stream, { mimeType });
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => saveStamp(mimeType);
                recorder.start();
                btn.innerText = "⏹ STOP RECORDING";
                btn.style.background = "red";
            } catch(e) { alert("Mic access denied!"); }
        } else {
            recorder.stop();
            btn.innerText = "📍 DROP A SOUND";
            btn.style.background = "#007AFF";
        }
    };

    async function saveStamp(mimeType) {
        const mood = prompt("Emoji tag?", "✨");
        const blob = new Blob(chunks, { type: mimeType });
        const ext = mimeType.includes('mp4') ? 'm4a' : 'webm';
        const fName = `audio_${Date.now()}.${ext}`;
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { error: uploadError } = await _db.storage.from('audio-files').upload(fName, blob);
            if(uploadError) return alert("Upload failed: " + uploadError.message);

            const { data } = _db.storage.from('audio-files').getPublicUrl(fName);
            
            // 【核心修复】同时写入旧版和新版字段名，确保万无一失
            const { error: insertError } = await _db.from('sound_stamps').insert([{
                username: sessionStorage.getItem('hyw_name'),
                avatar_type: sessionStorage.getItem('hyw_av'),
                emoji: mood || '📍', 
                audio_url: data.publicUrl,
                latitude: pos.coords.latitude, 
                longitude: pos.coords.longitude,
                lat: pos.coords.latitude, 
                lng: pos.coords.longitude
            }]);
            
            if(insertError) alert("Database Error: " + insertError.message);
            else location.reload();
        }, () => alert("GPS needed!"));
    }
</script>
</body>
</html>
