<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hear Your World - Final UX Fix</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #000; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 3000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card { text-align: center; width: 80%; max-width: 300px; }
        .av-opt { font-size: 50px; cursor: pointer; opacity: 0.2; margin: 10px; display: inline-block; transition: 0.3s; }
        .av-opt.selected { opacity: 1; transform: scale(1.2); }

        .pin-btn { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #000; padding: 20px 35px; border-radius: 100px;
            color: #fff; font-weight: 800; font-size: 14px; z-index: 2000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: none; display: none;
        }

        .custom-marker { text-align: center; cursor: pointer; -webkit-user-select: none; user-select: none; }
        .marker-body { width: 50px; height: 50px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 2px solid #fff; }
        .marker-name { color: #333; font-size: 10px; font-weight: 700; margin-top: 5px; background: rgba(255,255,255,0.9); padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="letter-spacing:-1px;">HEAR YOUR WORLD</h2>
        <input id="user-name" type="text" placeholder="Your Name" style="width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; margin-bottom:10px; font-size:16px;">
        <div class="avatar-box">
            <span id="av-m" class="av-opt" onclick="setAv('male')">👨🏻‍💻</span>
            <span id="av-f" class="av-opt" onclick="setAv('female')">👩🏻‍🎨</span>
        </div>
        <button onclick="enterWorld()" style="width:100%; padding:18px; background:#007AFF; color:white; border:none; border-radius:18px; font-weight:bold; font-size:16px;">TAP TO START</button>
    </div>
</div>

<div id="map"></div>
<button id="drop-button" class="pin-btn">📍 DROP A SOUND</button>

<script>
    const DB_URL = 'https://cpayvfeaelxsdimbfqkk.supabase.co'; 
    const DB_KEY = 'sb_publishable_ktemn0nndd99JZoeO6tV9g_ShZoBn8S'; 
    const _db = supabase.createClient(DB_URL, DB_KEY);

    const ADMINS = ['Dayou', 'Rainie'];
    let recorder, chunks = [], isRec = false;
    let audioCtx;

    mapboxgl.accessToken = 'pk.eyJ1IjoieW95b3pkeSIsImEiOiJjbW9vZnJvcmgxaDg0MndvZzRuOG0zYnRhIn0.cjcEvC5FbhpFRQ8jAJi-fA';
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11', 
        center: [121.47, 31.23],
        zoom: 13
    });

    window.onload = () => {
        if(sessionStorage.getItem('hyw_name')) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('drop-button').style.display = 'block';
            loadStamps();
        }
    };

    function setAv(t) {
        sessionStorage.setItem('hyw_av', t);
        document.getElementById('av-m').style.opacity = (t==='male'?'1':'0.2');
        document.getElementById('av-f').style.opacity = (t==='female'?'1':'0.2');
    }

    async function enterWorld() {
        const n = document.getElementById('user-name').value.trim();
        const av = sessionStorage.getItem('hyw_av');
        if(!n || !av) return alert("Pick a name and avatar!");
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        sessionStorage.setItem('hyw_name', n);
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('drop-button').style.display = 'block';
        loadStamps();
    }

    async function playSound(url) {
        try {
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);
            source.start(0);
        } catch (e) {
            new Audio(url).play();
        }
    }

    const btn = document.getElementById('drop-button');
    btn.onclick = async () => {
        if(!isRec) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = saveStamp;
            recorder.start();
            isRec = true;
            btn.innerText = "⏹ STOP RECORDING";
            btn.style.background = "red";
        } else {
            isRec = false;
            recorder.stop();
            btn.innerText = "📍 DROP A SOUND";
            btn.style.background = "#000";
        }
    };

    async function saveStamp() {
        const mood = prompt("Emoji?", "✨");
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const fName = `audio_${Date.now()}.webm`;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await _db.storage.from('audio-files').upload(fName, blob);
            const { data } = _db.storage.from('audio-files').getPublicUrl(fName);
            await _db.from('sound_stamps').insert([{
                username: sessionStorage.getItem('hyw_name'),
                avatar_type: sessionStorage.getItem('hyw_av'),
                emoji: mood || '📍',
                audio_url: data.publicUrl,
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude
            }]);
            location.reload();
        });
    }

    async function loadStamps() {
        const { data } = await _db.from('sound_stamps').select('*');
        const myName = sessionStorage.getItem('hyw_name');
        if(!data) return;

        data.forEach(s => {
            const el = document.createElement('div');
            el.className = 'custom-marker';
            el.innerHTML = `<div class="marker-body">${s.avatar_type==='male'?'👨🏻‍💻':'👩🏻‍🎨'}</div>
                            <div class="marker-name">${s.username} ${s.emoji}</div>`;
            
            // 【核心改进】单击只播放，长按删除
            let pressTimer;

            // 针对移动端的触摸逻辑
            el.addEventListener('touchstart', () => {
                pressTimer = window.setTimeout(() => {
                    if(ADMINS.includes(myName)) {
                        if(confirm(`Admin: Delete ${s.username}'s sound?`)) {
                            _db.from('sound_stamps').delete().eq('id', s.id).then(() => location.reload());
                        }
                    }
                }, 1000); // 长按 1 秒触发删除
            });

            el.addEventListener('touchend', () => {
                clearTimeout(pressTimer);
            });

            // 普通点击逻辑 (PC & 移动端)
            el.onclick = (e) => {
                e.stopPropagation();
                playSound(s.audio_url);
            };

            new mapboxgl.Marker(el).setLngLat([s.longitude, s.latitude]).addTo(map);
        });
    }
</script>
</body>
</html>
