<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hear Your World - Final Mobile Fix</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #000; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 4000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card { text-align: center; width: 85%; max-width: 320px; }
        .av-opt { font-size: 50px; cursor: pointer; opacity: 0.2; margin: 10px; display: inline-block; transition: 0.3s; }
        .av-opt.selected { opacity: 1; transform: scale(1.2); }

        .pin-btn { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: #000; padding: 20px 35px; border-radius: 100px;
            color: #fff; font-weight: 800; z-index: 2000; border: none; display: none;
        }

        /* 标记样式优化，适配 15s sound stamp 概念 */
        .custom-marker { text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .marker-body { width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid #fff; }
        .marker-name { color: #fff; font-size: 11px; font-weight: bold; margin-top: 6px; background: rgba(0,0,0,0.7); padding: 3px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h1 style="letter-spacing:-2px; margin-bottom:5px;">HEAR YOUR WORLD</h1>
        <p style="color:#999; margin-bottom:30px;">Tap to unlock the soundscape</p>
        <input id="user-name" type="text" placeholder="Your Name" style="width:100%; padding:18px; border-radius:20px; border:2px solid #eee; margin-bottom:15px; font-size:16px; outline:none;">
        <div class="avatar-box">
            <span id="av-m" class="av-opt" onclick="setAv('male')">👨🏻‍💻</span>
            <span id="av-f" class="av-opt" onclick="setAv('female')">👩🏻‍🎨</span>
        </div>
        <button onclick="enterWorld()" style="width:100%; padding:20px; background:#007AFF; color:white; border:none; border-radius:25px; font-weight:bold; font-size:18px;">START EXPLORING</button>
    </div>
</div>

<div id="map"></div>
<button id="drop-button" class="pin-btn">📍 DROP A SOUND</button>

<audio id="global-player" playsinline preload="auto"></audio>

<script>
    const DB_URL = 'https://cpayvfeaelxsdimbfqkk.supabase.co'; 
    const DB_KEY = 'sb_publishable_ktemn0nndd99JZoeO6tV9g_ShZoBn8S'; 
    const _db = supabase.createClient(DB_URL, DB_KEY);

    const ADMINS = ['Dayou', 'Rainie'];
    const player = document.getElementById('global-player');
    let recorder, chunks = [];

    mapboxgl.accessToken = 'pk.eyJ1IjoieW95b3pkeSIsImEiOiJjbW9vZnJvcmgxaDg0MndvZzRuOG0zYnRhIn0.cjcEvC5FbhpFRQ8jAJi-fA';
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11', 
        center: [121.47, 31.23],
        zoom: 13
    });

    window.onload = () => {
        if(sessionStorage.getItem('hyw_name')) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('drop-button').style.display = 'block';
            loadStamps();
        }
    };

    function setAv(t) {
        sessionStorage.setItem('hyw_av', t);
        document.getElementById('av-m').classList.toggle('selected', t==='male');
        document.getElementById('av-f').classList.toggle('selected', t==='female');
        document.getElementById('av-m').style.opacity = (t==='male'?'1':'0.2');
        document.getElementById('av-f').style.opacity = (t==='female'?'1':'0.2');
    }

    function enterWorld() {
        const n = document.getElementById('user-name').value.trim();
        const av = sessionStorage.getItem('hyw_av');
        if(!n || !av) return alert("Pick name & avatar!");
        
        // 【关键】在手机端这一点击瞬间激活音频播放器
        player.play().catch(()=>{}); 
        
        sessionStorage.setItem('hyw_name', n);
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('drop-button').style.display = 'block';
        loadStamps();
    }

    async function loadStamps() {
        const { data } = await _db.from('sound_stamps').select('*');
        const myName = sessionStorage.getItem('hyw_name');
        if(!data) return;

        data.forEach(s => {
            const el = document.createElement('div');
            el.className = 'custom-marker';
            el.innerHTML = `<div class="marker-body">${s.avatar_type==='male'?'👨🏻‍💻':'👩🏻‍🎨'}</div>
                            <div class="marker-name">${s.username} ${s.emoji}</div>`;
            
            let pressTimer;
            
            // 手机端专用的短按播放逻辑
            el.addEventListener('touchstart', (e) => {
                // 设置长按定时器（管理员功能）
                pressTimer = window.setTimeout(() => {
                    if(ADMINS.includes(myName)) {
                        if(confirm(`Admin: Delete ${s.username}'s sound?`)) {
                            _db.from('sound_stamps').delete().eq('id', s.id).then(() => location.reload());
                        }
                    }
                }, 800);
            });

            el.addEventListener('touchend', (e) => {
                clearTimeout(pressTimer);
                // 【修复核心】如果按下的时间很短（非长按），则立即播放声音
                // 使用这种方式可以确保在 touchend 瞬间触发播放，符合移动端安全策略
                if (e.cancelable) e.preventDefault(); 
                
                player.src = s.audio_url;
                player.load();
                const playPromise = player.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => console.log("Play failed", error));
                }
            });

            // 兼容电脑端点击
            el.onclick = (e) => {
                if (!window.ontouchstart) {
                    player.src = s.audio_url;
                    player.play();
                }
            };

            new mapboxgl.Marker(el).setLngLat([s.longitude, s.latitude]).addTo(map);
        });
    }

    // 录音逻辑
    const btn = document.getElementById('drop-button');
    btn.onclick = async () => {
        if(!recorder || recorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = saveStamp;
            recorder.start();
            btn.innerText = "⏹ STOP (RECORDING)";
            btn.style.background = "red";
        } else {
            recorder.stop();
            btn.innerText = "📍 DROP A SOUND";
            btn.style.background = "#000";
        }
    };

    async function saveStamp() {
        const mood = prompt("Emoji tag?", "✨");
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const fName = `audio_${Date.now()}.webm`;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await _db.storage.from('audio-files').upload(fName, blob);
            const { data } = _db.storage.from('audio-files').getPublicUrl(fName);
            await _db.from('sound_stamps').insert([{
                username: sessionStorage.getItem('hyw_name'),
                avatar_type: sessionStorage.getItem('hyw_av'),
                emoji: mood || '📍',
                audio_url: data.publicUrl,
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude
            }]);
            location.reload();
        });
    }
</script>
</body>
</html>
