<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hear Your World - MVP v3</title>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #fff; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center;
        }
        .auth-card { background: #fff; padding: 35px 25px; border-radius: 30px; text-align: center; width: 85%; max-width: 320px; }
        .avatar-box { display: flex; justify-content: center; gap: 30px; margin: 25px 0; }
        .av-opt { font-size: 55px; cursor: pointer; opacity: 0.2; transition: 0.3s; }
        .av-opt.selected { opacity: 1; transform: scale(1.1); }

        .pin-btn { 
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: #fff; padding: 18px 30px; border-radius: 100px; border: 1px solid #ddd;
            color: #000; font-weight: 800; font-size: 14px; z-index: 2000; 
            min-width: 220px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .pin-btn.recording { background: #FF3B30; color: #fff; border: none; }

        .custom-marker { text-align: center; cursor: pointer; transition: transform 0.1s; z-index: 10; }
        .custom-marker:active { transform: scale(0.9); }
        .marker-body { 
            width: 55px; height: 55px; background: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 34px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 3px solid #fff;
        }
        .marker-name { color: white; font-size: 11px; font-weight: 700; margin-top: 5px; background: rgba(0,0,0,0.6); padding: 3px 10px; border-radius: 20px; display: inline-block; }
        .marker-emoji { position: absolute; top: -5px; right: -5px; font-size: 22px; }
    </style>
</head>
